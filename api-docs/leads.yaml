openapi: 3.0.0
info:
    title: AIGens API - Leads
    version: 1.0.0
    description: Documentazione delle API per la gestione dei lead.

components:
    schemas:
        ModelInterest:
            type: object
            required:
                - model_id
                - name
                - usage_plan
                - usage_time
            properties:
                model_id:
                    type: string
                    description: ID del modello
                name:
                    type: string
                    description: Nome del modello
                usage_plan:
                    type: string
                    description: Piano di utilizzo (es. basic, pro, enterprise)
                usage_time:
                    type: string
                    description: Tempo di utilizzo previsto (es. 1 mese, 6 mesi, 1 anno)
            example:
                model_id: "claude-3-opus"
                name: "Claude 3 Opus"
                usage_plan: "pro"
                usage_time: "6 mesi"
        Lead:
            type: object
            required:
                - email
                - models_interest
                - estimated_savings
            properties:
                id:
                    type: integer
                    description: ID del lead
                email:
                    type: string
                    format: email
                    description: Email del lead
                models_interest:
                    type: array
                    items:
                        $ref: "#/components/schemas/ModelInterest"
                    description: Array di modelli di interesse
                estimated_savings:
                    type: number
                    format: float
                    description: Risparmio stimato in valuta
                currency:
                    type: string
                    default: EUR
                    description: Valuta del risparmio stimato
                status:
                    type: string
                    enum: [new, contacted, qualified, converted, lost]
                    default: new
                    description: Stato del lead nel processo di conversione
                notes:
                    type: string
                    description: Note sul lead
                contact_attempts:
                    type: integer
                    default: 0
                    description: Numero di tentativi di contatto
                last_contact_date:
                    type: string
                    format: date-time
                    description: Data dell'ultimo contatto
                source:
                    type: string
                    description: Fonte di acquisizione del lead
                user_id:
                    type: integer
                    description: ID dell'utente se il lead è stato convertito
                conversion_date:
                    type: string
                    format: date-time
                    description: Data di conversione del lead in utente
                created_at:
                    type: string
                    format: date-time
                    description: Data di creazione
                updated_at:
                    type: string
                    format: date-time
                    description: Data di ultimo aggiornamento
            example:
                id: 1
                email: "cliente@example.com"
                models_interest:
                    [
                        {
                            model_id: "claude-3-opus",
                            name: "Claude 3 Opus",
                            usage_plan: "pro",
                            usage_time: "6 mesi",
                        },
                    ]
                estimated_savings: 1500.00
                currency: "EUR"
                status: "new"
                notes: "Cliente interessato al piano pro"
                contact_attempts: 0
                source: "landing_page"
                created_at: "2023-01-01T12:00:00Z"
                updated_at: "2023-01-01T12:00:00Z"

paths:
    /api/v1/leads:
        post:
            summary: Crea un nuovo lead
            description: Endpoint pubblico per la creazione di un nuovo lead dal form di contatto
            tags: [Leads]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - email
                                - models_interest
                                - estimated_savings
                            properties:
                                email:
                                    type: string
                                    format: email
                                    description: Email del lead
                                models_interest:
                                    type: array
                                    items:
                                        $ref: "#/components/schemas/ModelInterest"
                                    description: Array di modelli di interesse
                                estimated_savings:
                                    type: number
                                    format: float
                                    description: Risparmio stimato in valuta
                                currency:
                                    type: string
                                    default: EUR
                                    description: Valuta del risparmio stimato
                                source:
                                    type: string
                                    description: Fonte di acquisizione del lead
            responses:
                "201":
                    description: Lead creato con successo
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    message:
                                        type: string
                                        example: Lead creato con successo
                                    data:
                                        $ref: "#/components/schemas/Lead"
                "400":
                    description: Dati mancanti o non validi
                "500":
                    description: Errore del server
        get:
            summary: Ottiene tutti i lead
            description: Recupera tutti i lead con possibilità di filtraggio
            tags: [Leads]
            security:
                - bearerAuth: []
            parameters:
                - in: query
                  name: page
                  schema:
                      type: integer
                      default: 1
                  description: Numero di pagina
                - in: query
                  name: limit
                  schema:
                      type: integer
                      default: 10
                  description: Numero di elementi per pagina
                - in: query
                  name: status
                  schema:
                      type: string
                      enum: [new, contacted, qualified, converted, lost]
                  description: Filtra i lead per stato
            responses:
                "200":
                    description: Lista di lead recuperata con successo
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    data:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Lead"
                "401":
                    description: Non autorizzato
                "500":
                    description: Errore del server
