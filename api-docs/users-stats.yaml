      tags:
        - UserStats
      summary: Ottiene le statistiche dei modelli preferiti per pie chart
      description: Restituisce i dati di utilizzo dei modelli preferiti per visualizzare grafici a torta nel dashboard. L'utente viene identificato automaticamente dal JWT token.
      security:
