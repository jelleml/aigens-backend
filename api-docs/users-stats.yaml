openapi: 3.0.0
info:
  title: Users Stats API
  description: API endpoints for user statistics and analytics dashboard
  version: 1.0.0

paths:
  /api/v1/users/stats/usage:
    get:
      tags:
        - UserStats
      summary: Ottiene le statistiche di utilizzo crediti per trend line
      description: Restituisce i dati di utilizzo crediti nel tempo per visualizzare grafici a linee nel dashboard. L'utente viene identificato automaticamente dal JWT token.
      security:
        - bearerAuth: []
      parameters:
        - name: date_from
          in: query
          required: false
          description: Data di inizio filtro (formato YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: "2025-07-01"
        - name: date_to
          in: query
          required: false
          description: Data di fine filtro (formato YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: "2025-07-31"
      responses:
        '200':
          description: Statistiche di utilizzo crediti recuperate con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatsResponse'
              example:
                success: true
                data:
                  - id: 135
                    id_user: "65e3d55a-4ef6-4774-9a56-bf3a32652c31"
                    type: "trendline_usage_credits"
                    label: "day7"
                    value: 1
                    aggregation_level: "1day"
                    calculated_at: "2025-07-09T22:26:07.000Z"
                    created_at: "2025-07-09T22:26:07.000Z"
                    updated_at: "2025-07-09T22:26:07.000Z"
        '400':
          description: Errore nei parametri di input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Non autorizzato - token JWT mancante o non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/stats/favourites/models:
